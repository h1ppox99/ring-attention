name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install deps
        run: uv sync --frozen

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format check
        run: uv run ruff format --check .

      - name: mypy
        run: uv run mypy

  test:
    name: Test + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install deps
        # Install CPU-only torch to keep the runner fast; all reference tests run on CPU.
        run: |
          uv sync --frozen
          uv pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: pytest + coverage
        run: uv run pytest

      - name: Upload coverage report
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
